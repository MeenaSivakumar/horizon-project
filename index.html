<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Nav Bar</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- sticky nav bar-->
    <header class="sticky-navbar">
      <nav>
        <ul class="nav-list">
          <li>
            <a href="#home">Home</a>
          </li>
          <li>
            <a href="#menu">menu</a>
          </li>
          <li>
            <a href="#settings">Settings</a>
          </li>
          <li>
            <a href="#service">Service</a>
          </li>
        </ul>
      </nav>
    </header>

    <!-- static column layout-->

    <div class="container">
      <div class="col">layout one</div>
      <div class="col">layout two</div>
      <div class="col">layout three</div>
    </div>

    <!-- flex box layout-->
    <div class="flex-layout">
      <div class="flex-col">layout one</div>
      <div class="flex-col">layout two</div>
      <div class="flex-col">layout three</div>
    </div>

    <!---- responsive nav bar-->
    <nav class="nav">
      <ul class="nav-list">
        <li>
          <a href="#home">Home</a>
        </li>
        <li>
          <a href="#menu">menu</a>
        </li>
        <li>
          <a href="#settings">Settings</a>
        </li>
        <li>
          <a href="#service">Service</a>
        </li>
      </ul>
    </nav>
  </body>
</html>
